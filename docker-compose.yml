services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: migrator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-migrator}
      POSTGRES_DB: migrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migrator"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://migrator:${POSTGRES_PASSWORD:-migrator}@db:5432/migrator
      SECRET_KEY: ${SECRET_KEY:-skift-mig-i-produktion}
      SA_KEYS_DIR: /data/sa_keys
      PROGRESS_DIR: /data/progress
      LOG_DIR: /data/logs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-http://187.77.89.243}
    volumes:
      - migration_data:/data
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    depends_on:
      - app

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx

volumes:
  postgres_data:
  migration_data:
  caddy_data:
  caddy_config:
