services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: migrator
      POSTGRES_PASSWORD: migrator
      POSTGRES_DB: migrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migrator"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://migrator:migrator@db:5432/migrator
      SECRET_KEY: ${SECRET_KEY:-skift-mig-i-produktion}
      SA_KEYS_DIR: /data/sa_keys
      PROGRESS_DIR: /data/progress
      LOG_DIR: /data/logs
    volumes:
      - migration_data:/data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  postgres_data:
  migration_data:
